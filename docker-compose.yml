services:
  postgres:
    image: postgres:16-alpine
    container_name: financy-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: financy
      POSTGRES_USER: financy
      POSTGRES_PASSWORD: financy
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U financy -d financy"]
      interval: 5s
      timeout: 5s
      retries: 10

  backend:
    build:
      context: ./backend
    container_name: financy-backend
    restart: unless-stopped
    environment:
      NODE_ENV: production
      PORT: 3333
      JWT_SECRET: local-dev-secret-change-me
      DATABASE_URL: postgresql://financy:financy@postgres:5432/financy?schema=public
      RUN_SEED: "true"
    ports:
      - "3333:3333"
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "node -e \"fetch('http://127.0.0.1:3333/health').then(r=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))\"",
        ]
      interval: 10s
      timeout: 5s
      retries: 10

  frontend:
    build:
      context: ./frontend
      args:
        VITE_BACKEND_URL: http://localhost:3333
    container_name: financy-frontend
    restart: unless-stopped
    ports:
      - "5173:80"
    depends_on:
      backend:
        condition: service_healthy

volumes:
  postgres_data:

